<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 30px;
        }

        .container {
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: auto;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 10px;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Product</h2>

    <form method="POST">
        <label>Name</label>
        <input type="text" name="name" value="{{ product[1] }}" required>

        <label>Description</label>
        <textarea name="description" required>{{ product[2] }}</textarea>

        <label>Price</label>
        <input type="number" step="0.01" name="price" value="{{ product[3] }}" required>

        <label>Stock</label>
        <input type="number" name="stock" value="{{ product[4] }}" required>

        <button type="submit">Update Product</button>
    </form>

    <a class="back" href="{{ url_for('products') }}">← Back to Products</a>
</div>

</body>
</html>
