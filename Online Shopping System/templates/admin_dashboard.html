<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:12px;
    color:white;
}

.card h2{
    font-weight:bold;
}

.sidebar{

    min-height:100vh;
    background:#212529;
    color:white;
}

.sidebar a{

    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
}

.sidebar a:hover{

    background:#0d6efd;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h3 class="text-center mt-3">
Admin
</h3>

<hr>

<a href="{{ url_for('admin_dashboard') }}">
Dashboard
</a>

<a href="{{ url_for('products') }}">
Manage Products
</a>

<a href="{{ url_for('add_product') }}">
Add Product
</a>

<a href="{{ url_for('shop') }}">
Shop
</a>

<a href="{{ url_for('logout') }}">
Logout
</a>

</div>

<div class="col-md-10">

<div class="container mt-4">

<h2>

Welcome,
{{ session['username'] }}

</h2>

<hr>

<div class="row">

<div class="col-md-3">

<div class="card bg-primary p-3">

<h5>Total Users</h5>

<h2>{{ total_users }}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card bg-success p-3">

<h5>Total Products</h5>

<h2>{{ total_products }}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card bg-warning p-3">

<h5>Total Orders</h5>

<h2>{{ total_orders }}</h2>

</div>

</div>

<div class="col-md-3">

<div class="card bg-danger p-3">

<h5>Total sales</h5>

<h2>₹ {{ total_sales }}</h2>

<a href="{{ url_for('admin_orders') }}" class="btn btn-dark">
    Manage Orders
</a>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
