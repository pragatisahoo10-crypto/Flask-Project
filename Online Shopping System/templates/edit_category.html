<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit Category</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{

background:#f5f5f5;

}

.card{

margin-top:60px;

padding:30px;

box-shadow:0 0 15px rgba(0,0,0,.2);

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<h2 class="text-center mb-4">

Edit Category

</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">

Category Name

</label>

<input
type="text"
name="category"
value="{{ category[1] }}"
class="form-control"
required>

</div>

<button
class="btn btn-primary w-100">

Update Category

</button>

</form>

<div class="text-center mt-3">

<a href="{{ url_for('categories') }}">

Back

</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
