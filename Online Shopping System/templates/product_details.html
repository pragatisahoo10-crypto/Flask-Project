<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product[1] }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .product-card{
            margin-top:40px;
            padding:30px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        .product-image{
            width:100%;
            height:350px;
            object-fit:cover;
            border-radius:10px;
        }

        .price{
            font-size:30px;
            color:green;
            font-weight:bold;
        }

        .stock{
            font-size:18px;
            color:#555;
        }

        .description{
            margin-top:20px;
            text-align:justify;
        }

        footer{
            margin-top:50px;
            padding:20px;
            text-align:center;
            background:#212529;
            color:white;
        }
    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="{{ url_for('dashboard') }}">
Online Shopping
</a>

<div>

<a class="btn btn-outline-light me-2" href="{{ url_for('shop') }}">
Shop
</a>

<a class="btn btn-warning me-2" href="{{ url_for('cart') }}">
Cart
</a>

<a class="btn btn-danger" href="{{ url_for('logout') }}">
Logout
</a>

</div>

</div>

</nav>

<div class="container">

<div class="product-card">

<div class="row">

<div class="col-md-5">

{% if product[5] %}

<img
src="{{ url_for('static', filename='uploads/' + product[5]) }}"
class="product-image">

{% else %}

<img
src="https://via.placeholder.com/500x350?text=No+Image"
class="product-image">

{% endif %}

</div>

<div class="col-md-7">

<h2>{{ product[1] }}</h2>

<hr>

<p class="price">
₹ {{ product[3] }}
</p>

<p class="stock">
Available Stock :
<strong>{{ product[4] }}</strong>
</p>

<div class="description">

<h5>Description</h5>

<p>
{{ product[2] }}
</p>

</div>

<div class="mt-4">

<a
href="{{ url_for('add_to_cart', id=product[0]) }}"
class="btn btn-success btn-lg">

Add to Cart

</a>

<a
href="{{ url_for('shop') }}"
class="btn btn-secondary btn-lg">

Continue Shopping

</a>

</div>

</div>

</div>

</div>

</div>

<footer>

<p>
© 2026 Online Shopping System
</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
