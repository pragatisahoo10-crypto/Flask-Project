<!DOCTYPE html>
<html>
<head>

<title>Admin Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>All Orders</h2>

<table class="table table-bordered table-striped">

<tr>

<th>ID</th>

<th>Customer</th>

<th>Total</th>

<th>Status</th>

<th>Date</th>

<th>Action</th>

</tr>

{% for order in orders %}

<tr>

<td>#{{ order.id }}</td>

<td>{{ order.username }}</td>

<td>₹ {{ order.total }}</td>

<td>{{ order.status }}</td>

<td>{{ order.created_at }}</td>

<td>

<a href="{{ url_for('admin_order_details', id=order.id) }}"
class="btn btn-primary btn-sm">

View

</a>

<a href="{{ url_for('update_order', id=order.id) }}"
class="btn btn-warning btn-sm">

Update

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
