<!DOCTYPE html>
<html>
<head>

<title>Update Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card">

<div class="card-header bg-warning">

<h3>Update Order Status</h3>

</div>

<div class="card-body">

<form method="POST">

<label class="form-label">

Order Status

</label>

<select
name="status"
class="form-select">

<option value="Pending"
{% if order.status=="Pending" %}selected{% endif %}>
Pending
</option>

<option value="Confirmed"
{% if order.status=="Confirmed" %}selected{% endif %}>
Confirmed
</option>

<option value="Shipped"
{% if order.status=="Shipped" %}selected{% endif %}>
Shipped
</option>

<option value="Delivered"
{% if order.status=="Delivered" %}selected{% endif %}>
Delivered
</option>

<option value="Cancelled"
{% if order.status=="Cancelled" %}selected{% endif %}>
Cancelled
</option>

</select>

<br>

<button class="btn btn-success">

Update

</button>

<a href="{{ url_for('admin_orders') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</body>
</html>
