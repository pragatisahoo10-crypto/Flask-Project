{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<div class="row">

<div class="col-md-3">
    <div class="card text-center bg-primary text-white">
        <div class="card-body">
            <h3>{{ total_employees }}</h3>
            <p>Total Employees</p>
        </div>
    </div>
</div>

<div class="col-md-3">
    <div class="card text-center bg-success text-white">
        <div class="card-body">
            <h3>{{ present_today }}</h3>
            <p>Present Today</p>
        </div>
    </div>
</div>

<div class="col-md-3">
    <div class="card text-center bg-info text-white">
        <div class="card-body">
            <h3>{{ paid_salary }}</h3>
            <p>Paid Salaries</p>
        </div>
    </div>
</div>

<div class="col-md-3">
    <div class="card text-center bg-danger text-white">
        <div class="card-body">
            <h3>{{ pending_salary }}</h3>
            <p>Pending Salaries</p>
        </div>
    </div>
</div>

</div>

{% endblock %}
