<!DOCTYPE html>

<html>
<head>
    <title>Employee Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

    <a class="navbar-brand" href="{{ url_for('dashboard') }}">
        EMS
    </a>

    {% if session.get("admin") %}
    <div>
        <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm">Dashboard</a>
        <a href="{{ url_for('employees') }}" class="btn btn-light btn-sm">Employees</a>
        <a href="{{ url_for('attendance') }}" class="btn btn-light btn-sm">Attendance</a>
        <a href="{{ url_for('payroll') }}" class="btn btn-light btn-sm">Payroll</a>
        <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a>
    </div>
    {% endif %}

</div>

</nav>

<div class="container mt-4">

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <div class="alert alert-info">
                {{ msg }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

{% block content %}
{% endblock %}


</div>

</body>
</html>
