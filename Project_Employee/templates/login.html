{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-4">

    <div class="card">
        <div class="card-header">
            <h3>Admin Login</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <input type="text"
                       name="username"
                       class="form-control mb-3"
                       placeholder="Username"
                       required>

                <input type="password"
                       name="password"
                       class="form-control mb-3"
                       placeholder="Password"
                       required>

                <button class="btn btn-primary w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

</div>

{% endblock %}
