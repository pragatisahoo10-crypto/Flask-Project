<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="d-flex" id="wrapper">

    <!-- Sidebar -->
    <div class="bg-dark" id="sidebar-wrapper">
        <div class="sidebar-heading text-center py-4 text-white fs-4 fw-bold">
            Admin Panel
        </div>

        <div class="list-group list-group-flush">
            <a href="/" class="list-group-item list-group-item-action bg-dark text-white">Dashboard</a>
            <a href="/students" class="list-group-item list-group-item-action bg-dark text-white">Students</a>
            <a href="/teachers" class="list-group-item list-group-item-action bg-dark text-white">Teachers</a>
            <a href="/courses" class="list-group-item list-group-item-action bg-dark text-white">Courses</a>
            <a href="/teacher_course" class="list-group-item list-group-item-action bg-dark text-white">Teacher-Course</a>
            <a href="/student_course" class="list-group-item list-group-item-action bg-dark text-white">Student-Course</a>
        </div>
    </div>

    <!-- Page Content -->
    <div id="page-content-wrapper" class="flex-fill">

        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">
    
            <h5 class="mb-0">Student Management System</h5>

            <div class="ms-auto">
                {% if session.get('admin_logged_in') %}
                    <a href="/logout" class="btn btn-outline-danger btn-sm">
                        Logout
                    </a>
                {% endif %}
            </div>
        </nav>

        <div class="container-fluid p-4">
            {% block content %}{% endblock %}
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
