{% extends "base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Add Teacher</h5>
            </div>
            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Teacher Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter teacher name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Designation</label>
                        <input type="text" name="designation" class="form-control" placeholder="Enter designation" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/teachers" class="btn btn-secondary">Back</a>
                        <button type="submit" class="btn btn-success">Save Teacher</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
