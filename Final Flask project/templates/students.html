{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h4>Students</h4>
    <a href="/add_student" class="btn btn-primary">Add Student</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th width="180">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s[0] }}</td>
                    <td>{{ s[1] }}</td>
                    <td>{{ s[2] }}</td>
                    <td>{{ s[3] }}</td>
                    <td>
                        <a href="/edit_student/{{ s[0] }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete_student/{{ s[0] }}"
                           onclick="return confirm('Are you sure?')"
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <ul class="pagination">
            {% for p in range(1, total_pages + 1) %}
            <li class="page-item">
                <a class="page-link" href="/students?page={{ p }}">{{ p }}</a>
            </li>
            {% endfor %}
        </ul>

    </div>
</div>

{% endblock %}
