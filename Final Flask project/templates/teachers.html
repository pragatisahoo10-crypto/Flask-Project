{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h4>Teachers</h4>
    <a href="/add_teacher" class="btn btn-primary">Add Teacher</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Designation</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for t in teachers %}
                <tr>
                    <td>{{ t[0] }}</td>
                    <td>{{ t[1] }}</td>
                    <td>{{ t[2] }}</td>
                    <td>{{ t[3] }}</td>
                    <td>
                        <a href="/edit_teacher/{{ t[0] }}" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/delete_teacher/{{ t[0] }}"
                           onclick="return confirm('Are you sure?')"
                           class="btn btn-danger btn-sm">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <ul class="pagination">
            {% for p in range(1, total_pages + 1) %}
            <li class="page-item">
                <a class="page-link" href="/teachers?page={{ p }}">{{ p }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>

{% endblock %}
